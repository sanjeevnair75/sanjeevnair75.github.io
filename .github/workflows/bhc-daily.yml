name: BHC Daily Orders Scraper

on:
  schedule:
    # Runs Monday-Saturday at 2:00 PM UTC (7:30 PM IST)
    - cron: '0 14 * * 1-6'
  workflow_dispatch:  # Also allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pypdf

      - name: Run BHC scraper
        run: python bhc_scrape.py

      - name: Commit and push data
        run: |
          git config user.name "BHC Tracker Bot"
          git config user.email "bot@jurisnair.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Daily BHC orders update - $(date +'%Y-%m-%d')"
            git push
          fi
