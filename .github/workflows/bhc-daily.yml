name: BHC Daily Orders Scraper

on:
  schedule:
    # Runs every 4 hours during Indian business hours (Mon-Sat)
    # Times in UTC | Equivalent IST
    # 04:00 UTC   = 09:30 AM IST  (morning)
    # 08:00 UTC   = 01:30 PM IST  (post-lunch)
    # 12:00 UTC   = 05:30 PM IST  (evening)
    # 16:00 UTC   = 09:30 PM IST  (end of day)
    - cron: '0 4,8,12,16 * * 1-6'
  workflow_dispatch:  # Also allow manual triggering from the Actions tab

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install pypdf

      - name: Run BHC scraper
        run: python bhc_scrape.py

      - name: Commit and push data
        run: |
          git config user.name "BHC Tracker Bot"
          git config user.email "bot@jurisnair.com"
          git add data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "BHC orders update - $(date +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
